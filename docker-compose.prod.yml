services:
  yownews-frontend:
    image: "${APP_IMAGE:?APP_IMAGE requis}"
    container_name: yownews-frontend
    pull_policy: always
    restart: unless-stopped
    environment:
      HOSTNAME: "${HOSTNAME:-0.0.0.0}"
      KSM_BASE_URL: "${KSM_BASE_URL:?}"
      KSM_CLIENT_ID: "${KSM_CLIENT_ID:?}"
      KSM_API_KEY: "${KSM_API_KEY:?}"
      NEXT_TELEMETRY_DISABLED: "${NEXT_TELEMETRY_DISABLED:-1}"
      NODE_ENV: "${NODE_ENV:-production}"
      PORT: "${PORT:-3000}"
      MOCK_MODE: "${MOCK_MODE:-false}"
      KSM_PLATFORM_ORG_CODE: "${KSM_PLATFORM_ORG_CODE:?}"
      NEXT_PUBLIC_KSM_PLATFORM_ORG_CODE: "${NEXT_PUBLIC_KSM_PLATFORM_ORG_CODE:?}"
      SESSION_SECRET: "${SESSION_SECRET:?}"
      SESSION_COOKIE_NAME: "${SESSION_COOKIE_NAME:-yowyob_edu_session}"
      SESSION_TTL_SECONDS: "${SESSION_TTL_SECONDS:-3600}"
      KSM_PLATFORM_ADMIN_EMAIL: "${KSM_PLATFORM_ADMIN_EMAIL:?}"
      KSM_PLATFORM_ADMIN_PASSWORD: "${KSM_PLATFORM_ADMIN_PASSWORD:?}"
      REDIS_HOST: "${REDIS_HOST:-yownews-redis}"
      REDIS_PORT: "${REDIS_PORT:-6379}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
    healthcheck:
      test: ["CMD-SHELL","wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 45s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.yownews.rule=Host(`education.yowyob.com`)"
      - "traefik.http.routers.yownews.entrypoints=websecure"
      - "traefik.http.routers.yownews.tls=true"
      - "traefik.http.routers.yownews.tls.certresolver=letsencrypt"
      - "traefik.http.routers.yownews.priority=10"
      - "traefik.http.services.yownews.loadbalancer.server.port=3000"
      - "traefik.docker.network=yowyob"
    depends_on:
      yownews-redis: { condition: service_healthy }
    networks: [yowyob, yownews-net]
  yownews-redis:
    image: redis:7-alpine
    container_name: yownews-redis
    restart: unless-stopped
    command: ["redis-server","--appendonly","yes"]
    volumes: [yownews-redis-data:/data]
    healthcheck: { test: ["CMD","redis-cli","ping"], interval: 10s, timeout: 5s, retries: 5 }
    networks: [yownews-net]
volumes:
  yownews-redis-data:
networks:
  yowyob: { external: true, name: yowyob }
  yownews-net: { name: yownews-net }
